# use Ctrl-a as prefix (screen-style); press Ctrl-a twice to send a literal Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# increase history
set-option -g history-limit 10000

# enable 24-bit truecolor passthrough (so nvim colors match outside tmux)
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# enable mouse
set-option -g mouse on

# make the active pane obvious: brighten and thicken its border
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
set -g pane-border-lines heavy

# prevent exiting copy mode after selection with mouse
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection -x

# start counting pane and window number at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# highlight the active window in the status bar (tab-style)
set -g window-status-current-style "bg=black,fg=white,bold"
set -g window-status-current-format " #I:#W "

# pad busy-blue / bell-red tabs on both sides so they look like buttons; plain tabs stay bare
set -g window-status-format "#{?#{||:#{==:#{@busy},1},#{window_bell_flag}}, #I:#W ,#I:#W}"

# one space between every tab; colored/active tabs add their own padding inside
set -g window-status-separator " "

# flag a window whose pane rang the bell (e.g. Claude Code needs input) in red
set -g monitor-bell on
set -g window-status-bell-style "bg=red,fg=white,bold"

# new window: create it then split left/right so it always opens as two side-by-side panes
bind c new-window -c ~ \; split-window -h -c ~ \; select-pane -L

# move window to a number; insert at that index (shifting the rest) instead of swapping, then follow to it.
# direction-aware: -a when moving toward the end, -b when moving toward the front, so the last index is reachable too
bind . command-prompt -T target -p "index:" "run-shell 'if [ %1 -gt #{window_index} ]; then tmux move-window -a -t %1 || tmux move-window -t %1; elif [ %1 -lt #{window_index} ]; then tmux move-window -b -t %1; fi; tmux select-window -t #{window_id}'"

# switch windows without prefix: Shift+Left/Right (previous/next)
bind -n S-Left  previous-window
bind -n S-Right next-window

# switch panes without prefix: Alt + h/j/k/l (vim-style)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# enable vi-like copy paste
setw -g mode-keys vi

# vim-style selection in copy mode: v to start selecting, y to yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# save and restore tmux sessions
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# initialize TPM; keep this line at the bottom
run '~/.tmux/plugins/tpm/tpm'
